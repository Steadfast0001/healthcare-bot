services:
  - type: web
    name: healthcare-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: healthcare-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_BASE_URL
        value: "https://healthcare-iunp3psg3-steadfasts-projects-59150365.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: healthcare-db
    databaseName: healthcare_db
    user: healthcare_user
